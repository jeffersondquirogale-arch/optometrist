server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Todas las rutas se sirven desde index.html (React SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cabeceras de caché para assets con hash en el nombre
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Caché corta para el HTML raíz
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
